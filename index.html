<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marleen">
<meta name="theme-color" content="#0d0f12">
<title>Marleen · Fencing Performance</title>
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header class="app-header">
  <div id="app-brand"></div>
  <div>
    <div class="hdr-date" id="hdr-date">—</div>
    <div class="hdr-week" id="hdr-week">—</div>
  </div>
</header>

<main class="panels">
  <section id="p-today" class="panel active"><div id="today-content"><div class="loading">Loading…</div></div></section>
  <section id="p-plan"  class="panel"><div id="plan-content"><div class="loading">Loading…</div></div></section>
  <section id="p-log"   class="panel"><div id="log-content"><div class="loading">Loading…</div></div></section>
  <section id="p-stats" class="panel"><div id="stats-content"><div class="loading">Loading…</div></div></section>
  <section id="p-body"  class="panel"><div id="body-content"><div class="loading">Loading…</div></div></section>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="showPanel('today')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 15.5 15.5"/></svg>
    <span class="nav-lbl">Today</span>
  </button>
  <button class="nav-btn" id="nav-plan" onclick="showPanel('plan')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="nav-lbl">Plan</span>
  </button>
  <button class="nav-btn" id="nav-log" onclick="showPanel('log')">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <span class="nav-lbl">Log</span>
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showPanel('stats')">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span class="nav-lbl">Performance</span>
  </button>
  <button class="nav-btn" id="nav-body" onclick="showPanel('body')">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    <span class="nav-lbl">Body</span>
  </button>
</nav>

<div class="modal-bg" id="modal-bg" onclick="closeModal()"></div>
<div class="modal" id="main-modal">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <div class="modal-title" id="modal-title">Log Session</div>
    <div class="modal-close" onclick="closeModal()">✕</div>
  </div>
  <div class="modal-body" id="modal-body"></div>
  <div class="modal-footer" id="modal-footer"><button class="btn-primary" onclick="saveModal()">Save</button></div>
</div>

<!-- ════════════════════════════════════════════
     Per-athlete DATA (the ONLY file that changes
     between athletes). Loads BEFORE the engine.
     ════════════════════════════════════════════ -->
<script src="./config.js"></script>

<!-- Shared ENGINE (identical for every athlete) -->
<script src="./app.js"></script>

</body>
</html>
