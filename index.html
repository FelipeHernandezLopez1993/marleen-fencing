      sleep:{emoji:'😴',title:'Sleep Away From Home',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Pack in your bag:</strong> eye mask, ear plugs, your own pillow case. The pillow case smells like home — it genuinely helps the brain relax in an unfamiliar room.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Room temperature:</strong> 18°C is optimal for sleep. Open the window or set the AC. A cool room = deeper sleep.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>White noise:</strong> turn on a fan, or use a white noise app. The brain ignores familiar sounds, but unfamiliar hotel sounds can wake you. White noise masks them all.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Phone across the room.</strong> Charge it away from the bed. No scrolling in bed — it delays sleep by 45+ min.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Magnesium tonight is critical</strong> — unfamiliar beds make sleep lighter. Magnesium activates the parasympathetic system.</span></div>`},
      mindset:{emoji:'🧠',title:'Mindset',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Tonight is not about performing.</strong> Your only job today is to arrive and rest. Everything else is already done.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>If you feel anxious:</strong> that is correct. Your body is preparing. That is the same adrenaline that will make you faster tomorrow. It is not a problem — it is preparation.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Before sleep:</strong> write 3 things you're grateful for. Small things are fine. This is not a ritual — it is a neurological reset that moves your nervous system out of threat-detection mode.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Avoid deep tactical analysis tonight. You know what to do. Trust the training.</span></div>`},
      focus:{emoji:'🎯',title:'Focus Prep',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Your cue word for tomorrow: <strong style="color:var(--accent);font-size:14px;letter-spacing:1px">${cue}</strong></span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>On the journey, run through your touch reset protocol mentally: exhale → feet → <strong>${cue}</strong> → eyes up. Ingrain the pattern before you need it.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Think about one tactical strength you want to use tomorrow. Just one. Not a game plan — one weapon you trust.</span></div>`},
    },
    eve:{
      nutrition:{emoji:'🍽',title:'Competition Eve Nutrition',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Dinner by 7pm:</strong> big pasta or rice meal. Familiar recipe. Moderate protein (chicken, fish). Low fat. Low fiber. Nothing adventurous.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Hydration:</strong> drink 500ml extra today. Urine should be pale yellow by this evening. You are pre-loading for tomorrow.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Snack before bed</strong> if hungry: banana + almond butter. Small. Nothing that requires digestion effort.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>No alcohol. No heavy dessert. No caffeine after 2pm. No new foods. Your gut needs to be calm tomorrow.</span></div>`},
      sleep:{emoji:'😴',title:'Sleep Ritual',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Screens off by 9:30pm.</strong> This is non-negotiable. The nervous system needs time to downshift.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Magnesium 1 hour before sleep</strong> — tonight more than any other night.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Box breathing to fall asleep:</strong> inhale 4s · hold 4s · exhale 4s · hold 4s. Repeat 5 rounds. This activates the vagus nerve and slows heart rate within 2 minutes.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Pre-competition sleep is often broken.</strong> That is normal. Even 5–6 broken hours is enough with your fitness level. The anxiety about sleep is worse than the lost sleep itself.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>If your mind races: write every worry on paper, then close the notebook. It has been filed. It can wait until after the competition.</span></div>`},
      mindset:{emoji:'🧠',title:'Mindset',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Your preparation is complete.</strong> You do not need to do anything tonight except rest. The work is done. Tomorrow is the delivery.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>5-min visualization in bed:</strong> see yourself competing well. Moving fast. Making good decisions. Scoring key touches. Don't force a perfect narrative — just let it play.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Focus on process, not result.</strong> The score takes care of itself when the actions are right. Tomorrow you are not thinking about winning — you are thinking about fencing.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>What Valentina Vezzali — 6× World Champion — did the night before every competition: reviewed 5 tactical scenarios, not outcomes. Then slept. That's all.</span></div>`},
      focus:{emoji:'🎯',title:'Focus & Mental Prep',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Review your cue word one final time: <strong style="color:var(--accent);font-size:14px;letter-spacing:1px">${cue}</strong></span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Tomorrow your only job during each bout is: <strong>exhale after every touch → reset → ${cue} → eyes on opponent.</strong> Score takes care of itself.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Review one tactical plan for tomorrow. One specific action you will execute confidently when you don't know what else to do. Your anchor move.</span></div>`},
    },
    race:{
      nutrition:{emoji:'🍽',title:'Nutrition All Day',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Morning meal (2–3h before first bout):</strong> oats + banana + honey + protein shake, OR 2 eggs + toast + juice. Moderate size — not stuffed.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Coffee timing:</strong> 45–60 min before your first bout, not immediately after waking. Caffeine peaks at 60 min. Too early and it fades. Too late and your hands shake.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>After pools:</strong> banana + rice cakes + isotonic drink or juice. Within 30 min. This is the most missed meal of the day and it costs people their DE.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Every 2 hours of waiting:</strong> small snack — dates, cereal bar, banana. Not heavy. Not nothing. The energy for the final is built during the pools.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>30 min before each DE bout:</strong> rice cakes + sports drink. Don't fence hungry. Ever.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Water every 30 min.</strong> Dehydration at 2% reduces reaction speed measurably. A fencer who isn't drinking is giving away touches.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Avoid:</strong> more coffee after 1pm (crash), anything fried or heavy (blood goes to digestion), too much sugar at once (insulin spike then drop).</span></div>`},
      warmup:{emoji:'⚡',title:'Warm-Up Protocol',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>30–40 min before first bout:</strong></span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>5 min footwork: advances, retreats, lunge series, explosive attacks. Get the legs warm.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>3 min shadow fencing: your key attacks, your parry-riposte, your feint-disengage. Feel the blade.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Light sweat = body temperature raised = reaction time 8–12% faster. If you're cold, you're slow.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>5 rounds of box breathing before you put on the mask for the first time: in 4 · hold 4 · out 4 · hold 4.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>One tactical intention for this bout. One. Specific. Actionable. Not "fence well" — "attack with feint-disengage if they hang in sixte."</span></div>`},
      focus:{emoji:'🎯',title:'Focus Reset — Mid-Match',body:`
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5">You lose concentration mid-match. Here is the protocol you run after <em>every single touch</em> — win or lose:</div>
        <div class="focus-reset-box">
          <div class="focus-step">
            <div class="focus-step-num" style="background:rgba(232,84,84,.15);color:var(--red)">1</div>
            <div class="focus-step-text"><strong>EXHALE</strong><div class="focus-step-sub">One long breath out. This is not optional. It resets the nervous system in 2 seconds.</div></div>
          </div>
          <div class="focus-step">
            <div class="focus-step-num" style="background:rgba(232,184,75,.15);color:var(--yellow)">2</div>
            <div class="focus-step-text"><strong>FEET</strong><div class="focus-step-sub">Check your stance. Feel the floor. Adjust your weight. This brings your attention from your head back into your body.</div></div>
          </div>
          <div class="focus-step">
            <div class="focus-step-num" style="background:rgba(61,155,233,.15);color:var(--accent)">3</div>
            <div class="focus-step-text"><strong style="font-size:16px;letter-spacing:2px;color:var(--accent)">${cue}</strong><div class="focus-step-sub">Your word. Say it internally. It means: I am here. I am sharp. Only this touch.</div></div>
          </div>
          <div class="focus-step">
            <div class="focus-step-num" style="background:rgba(76,175,130,.15);color:var(--green)">4</div>
            <div class="focus-step-text"><strong>EYES UP</strong><div class="focus-step-sub">Look at your opponent. Not the scoreboard. Not the crowd. Them. The next touch starts now.</div></div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--muted);line-height:1.5;background:var(--card2);border-radius:8px;padding:10px">
          <strong style="color:var(--text)">The rule:</strong> There is no match. There is only this touch. Always only this touch. The score is information — it is not your job. Your job is the next touch.
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--muted);line-height:1.5">If losing: <strong style="color:var(--text)">slow down</strong>. Don't rush. Rushing when losing is how you give away 3 more touches. Go back to your anchor move — the one thing you trust.</div>`},
      between:{emoji:'⏳',title:'Between Bouts',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Stay warm.</strong> Don't sit in the cold. Keep moving lightly. A cold muscle is a slow muscle.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Eat small.</strong> Even if you don't feel hungry. Adrenaline suppresses appetite — but your muscles are burning through glycogen.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Don't over-analyze the last bout.</strong> 2–3 tactical notes maximum. Then close it. You cannot change what happened. You can change the next bout.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>What elite fencers do between DEs:</strong> light footwork, water, one small snack, short mental reset. NOT drilling, NOT anxious reviewing of video, NOT talking to too many people. Rest and refuel.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Before the next bout:</strong> back to the pre-bout protocol. 5 breaths. One tactical intention. ${cue}. Every time.</span></div>`},
    },
    recovery:{
      nutrition:{emoji:'🍽',title:'Recovery Nutrition',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Recovery meal within 60 min</strong> if you haven't already: protein + carbs. Chicken + rice, sandwich + shake, whatever is available. Eat even if you're not hungry — adrenaline suppresses appetite.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Rehydrate:</strong> 500–750ml of water with electrolytes if possible. You lost more than you think.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Back to normal eating today. Don't under-eat in "recovery mode" — your body needs nutrients to repair.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>All supplements back to normal. Magnesium tonight — your muscles need it after yesterday's output.</span></div>`},
      rest:{emoji:'😴',title:'Rest & Movement',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Zero gym today.</strong> Your body needs integration time. This is not weakness — this is how adaptation happens.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Easy movement is good: a 20-min walk, gentle yoga, foam rolling. Active recovery beats complete rest.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>How you feel today does not reflect how you fenced. Adrenaline crashes are real. You may feel flat, heavy, or emotional. All of this is normal.</span></div>`},
      mindset:{emoji:'🧠',title:'Debrief',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span><strong>Three questions tonight.</strong> Not a full analysis. Three questions and close it:</span></div>
        <div style="background:var(--card2);border-radius:8px;padding:12px;margin:8px 0">
          <div style="font-size:12px;color:var(--text);margin-bottom:8px">1. <strong>What action am I most proud of?</strong> <span style="color:var(--muted)">(Not result — action)</span></div>
          <div style="font-size:12px;color:var(--text);margin-bottom:8px">2. <strong>What one moment would I change, and how?</strong> <span style="color:var(--muted)">(Specific, actionable)</span></div>
          <div style="font-size:12px;color:var(--text)">3. <strong>What did I learn about my fencing?</strong> <span style="color:var(--muted)">(Something you didn't know before)</span></div>
        </div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Celebrate the effort. Win or lose, you competed. That matters more than the result at this stage of your career.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>Tomorrow: one tactical thing to improve before the next competition. Write it down. Then let yesterday go.</span></div>`},
      focus:{emoji:'🎯',title:'Mental Reset',body:`
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>How did the touch reset work? Did you use <strong style="color:var(--accent)">${cue}</strong>? When did it work best? When did you forget it? These observations are training data.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>If you lost focus at a specific moment — write it down. Not to dwell, but to recognize the pattern so you can train around it.</span></div>
        <div class="comp-bullet"><span class="comp-bullet-dot" style="color:${col}">◆</span><span>The mental game is a skill like any other. It gets better with deliberate practice, not just with wishing.</span></div>`},
    },
  };

  const ps = sections[phase];
  const sectionKeys = Object.keys(ps);

  let sectionsHTML = sectionKeys.map(key => {
    const s = ps[key];
    const id = `cs-${phase}-${key}`;
    return `
      <div class="comp-section-head" onclick="toggleCompSection('${id}')">
        <div class="comp-section-title">${s.emoji} ${s.title}</div>
        <span data-chevron="${id}" style="color:var(--muted);font-size:12px">▸</span>
      </div>
      <div id="${id}" class="comp-section-body" style="display:none">${s.body}</div>`;
  }).join('');

  const nowList = nowItems[phase].map(t=>`
    <div class="comp-now-item">
      <div class="comp-now-dot" style="background:${col}"></div>
      <div style="flex:1">${t}</div>
    </div>`).join('');

  const bgGradient = {
    prep:'linear-gradient(135deg,rgba(232,131,75,.12) 0%,rgba(12,13,16,0) 70%)',
    travel:'linear-gradient(135deg,rgba(232,184,75,.1) 0%,rgba(12,13,16,0) 70%)',
    eve:'linear-gradient(135deg,rgba(232,131,75,.12) 0%,rgba(12,13,16,0) 70%)',
    race:'linear-gradient(135deg,rgba(232,84,84,.14) 0%,rgba(12,13,16,0) 70%)',
    recovery:'linear-gradient(135deg,rgba(76,175,130,.1) 0%,rgba(12,13,16,0) 70%)',
  };

  return `<div class="comp-guide" style="background:${bgGradient[phase]};border-color:${col}33">
    <div class="comp-guide-header" style="border-bottom:1px solid ${col}22">
      <div>
        <div class="comp-guide-name">${phaseEmoji[phase]} ${comp.name} ${comp.emoji}</div>
        <div class="comp-guide-sub">${comp.date}</div>
      </div>
      <div class="comp-guide-phase" style="background:${col}22;color:${col};border:1px solid ${col}44">${phaseLabels[phase]}</div>
    </div>
    <div class="comp-guide-body">
      <div class="comp-now">${nowList}</div>
      ${sectionsHTML}
    </div>
  </div>`;
}


// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
// Handle Polar OAuth callback
(function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  if (!code) return;
  history.replaceState({}, '', window.location.pathname);
  if (state === 'polar') handlePolarCallback(code).then(() => showPanel('body'));
})();

document.addEventListener('DOMContentLoaded', ()=>{
  updateHeader();
  setInterval(updateHeader, 60000);
  renderToday();
});
</script>
</body>
</html>
