<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marleen">
<meta name="theme-color" content="#0c0d10">
<title>Marleen · Fencing Performance</title>
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --accent:#3D9BE9;--dark:#0c0d10;--card:#14161b;--card2:#1a1d24;
  --border:rgba(255,255,255,0.07);--text:#e4e8f0;--muted:#6e7a8a;
  --green:#4CAF82;--blue:#3D9BE9;--yellow:#E8B84B;--purple:#9B7FE8;--teal:#3EC9C1;--red:#E85454;
  --orange:#E8834B;
  --nav-h:60px;--hdr-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;font-size:14px;line-height:1.5}

.app-header{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:var(--dark);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100}
.app-header h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff}
.hdr-date{font-size:11px;color:var(--muted);text-align:right}
.hdr-week{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:var(--accent);text-align:right}

.panels{position:fixed;top:var(--hdr-h);bottom:var(--nav-h);left:0;right:0;overflow:hidden}
.panel{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 24px}
.panel.active{display:block}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--card);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;transition:color .15s;font-family:'DM Sans',sans-serif}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-lbl{font-size:9px;letter-spacing:.8px;text-transform:uppercase;font-weight:500}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.card-row:last-child{border:none;padding-bottom:0}
.card-row .lbl{color:var(--muted);flex-shrink:0}
.card-row .val{color:var(--text);text-align:right;line-height:1.4}
.card-row .val em{color:var(--accent);font-style:normal}

.sec-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:20px 0 10px}
.sec-label:first-child{margin-top:0}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;letter-spacing:1px;line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

.sblock{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden}
.sblock::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.sblock.strength::before{background:var(--orange)}
.sblock.fencing::before{background:var(--accent)}
.sblock.run::before{background:var(--green)}
.sblock.yoga::before{background:var(--purple)}
.sblock.rest::before{background:var(--muted)}
.sblock.done{opacity:.5}
.sblock.done::after{content:'DONE';position:absolute;top:10px;right:10px;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1.5px;color:var(--green);border:1px solid var(--green);border-radius:4px;padding:1px 6px}
.sblock-tag{font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:2px}
.strength .sblock-tag{color:var(--orange)}.fencing .sblock-tag{color:var(--accent)}.run .sblock-tag{color:var(--green)}.yoga .sblock-tag{color:var(--purple)}.rest .sblock-tag{color:var(--muted)}
.sblock-name{font-size:13px;font-weight:500;color:#fff;margin-bottom:3px}
.sblock-detail{font-size:11px;color:var(--muted);line-height:1.4}
.sblock-dur{font-size:9px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.sblock-actions{display:flex;gap:8px;margin-top:10px}
.btn-log{flex:1;padding:8px;background:rgba(61,155,233,.12);border:1px solid rgba(61,155,233,.3);border-radius:8px;color:var(--accent);font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn-log:active{background:rgba(61,155,233,.22)}
.btn-done{padding:8px 12px;background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.25);border-radius:8px;color:var(--green);font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif}

.alert{border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:12px;line-height:1.6}
.alert.green{background:rgba(76,175,130,.08);border:1px solid rgba(76,175,130,.25);color:var(--green)}
.alert.yellow{background:rgba(232,184,75,.08);border:1px solid rgba(232,184,75,.25);color:var(--yellow)}
.alert.red{background:rgba(232,84,84,.08);border:1px solid rgba(232,84,84,.3);color:var(--red)}
.alert.blue{background:rgba(61,155,233,.08);border:1px solid rgba(61,155,233,.25);color:var(--accent)}
.alert-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:500;opacity:.7;margin-bottom:3px}

.pbar-wrap{height:4px;background:var(--border);border-radius:4px;margin-top:5px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .4s}

.water-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.water-glasses{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.glass{width:36px;height:44px;background:var(--card2);border:1px solid var(--border);border-radius:4px 4px 8px 8px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s}
.glass.filled{border-color:var(--accent)}
.glass.filled::after{content:'';position:absolute;bottom:0;left:0;right:0;height:70%;background:rgba(61,155,233,.35)}
.water-total{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)}

.supp-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.supp-item:last-child{border:none}
.supp-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.supp-item.done .supp-check{background:var(--green);border-color:var(--green)}
.supp-check-mark{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none}
.supp-item.done .supp-check-mark{display:block}
.supp-name{font-size:12px;color:var(--text);flex:1}
.supp-time{font-size:10px;color:var(--muted)}

.macro-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.macro-tile{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.macro-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff}
.macro-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.macro-sub{font-size:10px;color:var(--accent)}

.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
.dhead{text-align:center;font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding-bottom:6px;font-weight:500}
.sblock-sm{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 5px;margin-bottom:4px;position:relative;overflow:hidden;min-height:72px;cursor:pointer}
.sblock-sm::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:6px 6px 0 0}
.sblock-sm.strength::before{background:var(--orange)}.sblock-sm.fencing::before{background:var(--accent)}.sblock-sm.run::before{background:var(--green)}.sblock-sm.yoga::before{background:var(--purple)}.sblock-sm.rest::before{background:var(--muted)}
.sblock-sm.rest{opacity:.4;cursor:default}
.sblock-sm.done-sm{opacity:.45}
.sblock-sm.done-sm::after{content:'✓';position:absolute;bottom:3px;right:4px;font-size:9px;color:var(--green)}
.sm-tag{font-size:7px;text-transform:uppercase;letter-spacing:.5px;font-weight:500;color:var(--muted);margin-bottom:1px}
.sm-name{font-size:9px;font-weight:500;color:#fff;line-height:1.2}
.sm-dur{font-size:8px;color:var(--muted);margin-top:3px}
.today-col .sblock-sm{border-color:rgba(61,155,233,.35)}
.today-col .dhead{color:var(--accent)}

.week-nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.wbtn{padding:4px 9px;border-radius:100px;font-size:9px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif}
.wbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.phase-sep{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:0 2px}
.wstats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.wstat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 8px}
.wstat-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;letter-spacing:1px;line-height:1}
.wstat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}

.log-recent-item{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.log-ri-top{display:flex;justify-content:space-between;align-items:center}
.log-ri-name{font-size:12px;font-weight:500;color:var(--text)}
.log-ri-date{font-size:10px;color:var(--muted)}
.log-ri-metrics{font-size:11px;color:var(--muted);margin-top:3px}
.log-ri-metrics em{color:var(--accent);font-style:normal}

.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.chart-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;color:var(--text);margin-bottom:10px}
.chart-canvas-wrap{position:relative;height:160px}

.form-field{margin-bottom:12px}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:500;margin-bottom:5px}
.form-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:10px 12px;outline:none;-webkit-appearance:none;transition:border-color .15s}
.form-input:focus{border-color:rgba(61,155,233,.5)}
.form-input::placeholder{color:var(--muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none;-webkit-appearance:none;cursor:pointer}

.injury-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.injury-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.injury-part{font-size:13px;font-weight:500;color:var(--text)}
.injury-badge{font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;padding:2px 7px;border-radius:100px}
.badge-active{background:rgba(232,84,84,.15);color:var(--red);border:1px solid rgba(232,84,84,.3)}
.badge-monitoring{background:rgba(232,184,75,.15);color:var(--yellow);border:1px solid rgba(232,184,75,.3)}
.badge-resolved{background:rgba(76,175,130,.15);color:var(--green);border:1px solid rgba(76,175,130,.3)}
.injury-desc{font-size:11px;color:var(--muted)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;backdrop-filter:blur(2px)}
.modal-bg.open{display:block}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:18px 18px 0 0;border-top:1px solid var(--border);z-index:201;max-height:85vh;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.modal.open{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:10px auto 0;flex-shrink:0}
.modal-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;color:#fff}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--card2);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;flex:1}
.modal-footer{padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);flex-shrink:0}
.btn-primary{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-secondary{width:100%;padding:12px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-top:8px}

.set-row{display:grid;grid-template-columns:28px 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px}
.set-num{font-size:11px;color:var(--muted);text-align:center;font-weight:500}
.set-input{background:var(--card2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 8px;outline:none;width:100%;-webkit-appearance:none;text-align:center}
.set-input:focus{border-color:rgba(61,155,233,.5)}
.btn-add-set{width:100%;padding:8px;background:none;border:1px dashed var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;margin-top:4px;margin-bottom:12px}
.exercise-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.exercise-name{font-size:12px;font-weight:500;color:var(--text)}
.exercise-hint{font-size:10px;color:var(--muted)}
.sets-header{display:grid;grid-template-columns:28px 1fr 1fr auto;gap:6px;margin-bottom:4px}
.sets-hdr-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:center}
.divider{height:1px;background:var(--border);margin:12px 0}

.chip{display:inline-flex;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border);border-radius:100px;padding:4px 10px;font-size:10px;font-weight:500;color:var(--muted)}
.chip-dot{width:5px;height:5px;border-radius:50%}
.double-badge{display:inline-block;background:rgba(61,155,233,.12);border:1px solid rgba(61,155,233,.25);border-radius:4px;font-size:8px;color:var(--accent);padding:1px 5px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.pm-badge{display:inline-block;background:rgba(155,127,232,.12);border:1px solid rgba(155,127,232,.25);border-radius:4px;font-size:8px;color:var(--purple);padding:1px 5px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}

.condition-card{border-radius:12px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.condition-card.peak{background:linear-gradient(135deg,rgba(76,175,130,.12) 0%,rgba(12,13,16,.8) 80%);border:1px solid rgba(76,175,130,.3)}
.condition-card.good{background:linear-gradient(135deg,rgba(232,184,75,.10) 0%,rgba(12,13,16,.8) 80%);border:1px solid rgba(232,184,75,.25)}
.condition-card.caution{background:linear-gradient(135deg,rgba(232,184,75,.10) 0%,rgba(12,13,16,.8) 80%);border:1px solid rgba(232,184,75,.25)}
.condition-card.warning{background:linear-gradient(135deg,rgba(232,84,84,.10) 0%,rgba(12,13,16,.8) 80%);border:1px solid rgba(232,84,84,.3)}
.condition-card.unknown{background:var(--card);border:1px solid var(--border)}
.condition-status{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:4px}
.condition-card.peak .condition-status{color:var(--green)}
.condition-card.good .condition-status{color:var(--yellow)}
.condition-card.caution .condition-status{color:var(--yellow)}
.condition-card.warning .condition-status{color:var(--red)}
.condition-card.unknown .condition-status{color:var(--muted)}
.condition-msg{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.sleep-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.sleep-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;min-width:36px}
.sleep-range{-webkit-appearance:none;width:100%;height:4px;background:var(--card2);border-radius:4px;outline:none;cursor:pointer}
.sleep-range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer}
.btn-save-sleep{padding:8px 12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;white-space:nowrap}

.add-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;background:none;border:1px dashed var(--border);border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;width:100%;margin-top:4px}
.add-btn:active{background:var(--card2)}
.empty-state{text-align:center;padding:32px 16px;color:var(--muted);font-size:12px;line-height:1.6}
.empty-state-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text);margin-bottom:6px}
.loading{text-align:center;padding:24px;color:var(--muted);font-size:12px}
textarea.form-input{resize:vertical;min-height:72px}

.hrv-btns{display:flex;gap:6px}
.hrv-btn{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .15s;font-weight:500}
.hrv-btn.active-green{background:rgba(76,175,130,.15);border-color:rgba(76,175,130,.5);color:var(--green)}
.hrv-btn.active-orange{background:rgba(232,184,75,.15);border-color:rgba(232,184,75,.5);color:var(--yellow)}
.hrv-btn.active-red{background:rgba(232,84,84,.15);border-color:rgba(232,84,84,.5);color:var(--red)}
.conn-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.conn-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.conn-row:last-child{border:none}
.conn-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.conn-info{flex:1;margin-left:10px}
.conn-name{font-size:13px;font-weight:500;color:var(--text)}
.conn-status{font-size:11px;margin-top:1px}
.progress-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}

/* Competition Guide */

function todayStr() { return new Date().toISOString().slice(0,10); }
function safeParseJSON(s) { try { return s ? JSON.parse(s) : null; } catch(e) { return null; } }

function sessionDate(wIdx, dIdx) {
  const start = new Date(PROGRAM_START+'T12:00:00');
  start.setDate(start.getDate() + wIdx*7 + dIdx);
  return start.toISOString().slice(0,10);
}
function isPastSession(wIdx, dIdx) { return sessionDate(wIdx,dIdx) < todayStr(); }
function isFutureSession(wIdx, dIdx) { return sessionDate(wIdx,dIdx) > todayStr(); }

function getTodayInfo() {
  const start = new Date(PROGRAM_START+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0); start.setHours(0,0,0,0);
  const diff = Math.round((now - start) / 86400000);
  if (diff < 0 || diff >= TOTAL_WEEKS * 7) return null;
  return { weekIdx:Math.floor(diff/7), dayIdx:diff%7, weekNum:Math.floor(diff/7)+1, dayNum:(diff%7)+1 };
}

function getDayType(wIdx, dIdx) {
  const am = resolveSession(wIdx, dIdx, 'am');
  const pm = resolveSession(wIdx, dIdx, 'pm');
  const hasAm = am && am.t !== 'rest';
  const hasPm = pm && pm.t !== 'rest';
  if (!hasAm && !hasPm) return 'rest';
  return (hasAm && hasPm) ? 'double' : 'single';
}

function typeColor(t) {
  return {strength:'var(--orange)',fencing:'var(--accent)',run:'var(--green)',
    yoga:'var(--purple)',rest:'var(--muted)'}[t]||'var(--muted)';
}

function getExercisesForSession(name) {
  for (const key of Object.keys(EXERCISES)) {
    if (name.startsWith(key)) return EXERCISES[key];
  }
  const n = name.toLowerCase();
  if (n.includes('lower')) return EXERCISES['Power Lower A'];
  if (n.includes('upper a')) return EXERCISES['Athletic Upper A'];
  if (n.includes('upper b')) return EXERCISES['Athletic Upper B'];
  if (n.includes('upper')) return EXERCISES['Athletic Upper A'];
  if (n.includes('total') || n.includes('body')) return EXERCISES['Total Body Athletic'];
  return EXERCISES['Power Lower A'];
}

function getPhaseForSession() {
  if (!_logCtx) return 2;
  return PLAN[_logCtx.wIdx]?.ph || 2;
}

function getSetsCount(exIdx, phase) {
  if (exIdx === 0) return [3,4,4,3][phase-1] || 3;
  return [2,3,3,2][phase-1] || 3;
}

function getCondition(score) {
  if (score === null || score === undefined)
    return { level:'unknown', label:'Log Sleep Score', msg:'Enter your Polar Nightly Recharge score to see today\'s readiness.' };
  if (score >= 70) return { level:'peak',    label:'Peak Condition',    msg:'Recovery is excellent. Your body is primed. Push hard in today\'s sessions — on the piste and in the gym.' };
  if (score >= 50) return { level:'good',    label:'Good to Train',     msg:'Solid recovery. Proceed as planned. Stay focused on technique in fencing — good but not perfect state.' };
  if (score >= 30) return { level:'caution', label:'Reduce Intensity',  msg:'Below optimal. Cut gym intensity 15–20%. In fencing, focus on precision over power today.' };
  return             { level:'warning', label:'Rest Recommended', msg:'Recovery is insufficient. Light session or full rest. Pushing hard now risks injury and slows adaptation.' };
}

function getSwaps() { return safeParseJSON(localStorage.getItem('session_swaps'))||{}; }
function saveSwaps(s) { localStorage.setItem('session_swaps', JSON.stringify(s)); }
function swapKey(wIdx,dIdx,slot) { return `${wIdx}-${dIdx}-${slot}`; }

function resolveSession(wIdx, dIdx, slot) {
  const swaps = getSwaps();
  const key = swapKey(wIdx,dIdx,slot);
  for (const [from, to] of Object.entries(swaps)) {
    if (to === key) {
      const [fw,fd,fs] = from.split('-');
      const orig = PLAN[+fw]?.days[+fd];
      return orig ? (fs==='pm'?orig.pm:orig.am) : null;
    }
  }
  if (swaps[key]) return null;
  return slot==='pm' ? PLAN[wIdx]?.days[dIdx]?.pm : PLAN[wIdx]?.days[dIdx]?.am;
}

function isMovedOut(wIdx, dIdx, slot) { return !!getSwaps()[swapKey(wIdx,dIdx,slot)]; }

function resolveLogContext(wIdx, dIdx, slot) {
  const swaps = getSwaps();
  const key = swapKey(wIdx, dIdx, slot);
  for (const [from, to] of Object.entries(swaps)) {
    if (to === key) { const p = from.split('-'); return [+p[0],+p[1],p[2]]; }
  }
  return [wIdx, dIdx, slot];
}

function openMoveModal(wIdx, dIdx, slot) {
  const s = resolveSession(wIdx, dIdx, slot);
  if (!s) return;
  const today = getTodayInfo();
  const todayAbs = today ? today.weekIdx*7 + today.dayIdx : 0;
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let rows = '';
  PLAN.forEach((week, wi) => {
    week.days.forEach((day, di) => {
      const abs = wi*7+di;
      if (abs < todayAbs) return;
      if (wi===wIdx && di===dIdx) return;
      const existingSession = resolveSession(wi, di, slot);
      const existingName = existingSession ? existingSession.n : '—';
      rows += `<div onclick="confirmSwap(${wIdx},${dIdx},'${slot}',${wi},${di})" style="padding:10px 8px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;color:var(--text);font-weight:500">W${wi+1} ${dayNames[di]} <span style="color:var(--muted);font-weight:300;font-size:11px">${sessionDate(wi,di)}</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${existingName}</div>
        </div>
        <span style="color:var(--accent);font-size:18px">→</span>
      </div>`;
    });
  });
  openModal(`Move · ${s.n}`, `
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Choose where to move this session.</div>
    <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:320px;overflow-y:auto">${rows}</div>
  `, null);
}

function confirmSwap(fromW, fromD, fromSlot, toW, toD) {
  const swaps = getSwaps();
  const fromK = swapKey(fromW,fromD,fromSlot);
  const toK   = swapKey(toW,toD,fromSlot);
  for (const k of Object.keys(swaps)) { if (swaps[k]===toK||k===toK) delete swaps[k]; }
  delete swaps[fromK];
  let targetOrigFrom = null;
  for (const [k,v] of Object.entries(swaps)) { if(v===toK){targetOrigFrom=k;break;} }
  if (targetOrigFrom) delete swaps[targetOrigFrom];
  const targetNative = PLAN[toW]?.days[toD]?.[fromSlot==='pm'?'pm':'am'];
  if (targetNative && targetNative.t !== 'rest') swaps[toK] = fromK;
  swaps[fromK] = toK;
  saveSwaps(swaps);
  closeModal();
  if (activePanel==='today') renderToday();
  if (activePanel==='plan')  renderPlan();
}

function undoSwap(wIdx, dIdx, slot) {
  const swaps = getSwaps();
  const key = swapKey(wIdx,dIdx,slot);
  for (const [k,v] of Object.entries(swaps)) {
    if (v===key) { delete swaps[k]; delete swaps[key]; saveSwaps(swaps); break; }
  }
  if (swaps[key]) { delete swaps[key]; saveSwaps(swaps); }
  if (activePanel==='today') renderToday();
  if (activePanel==='plan')  renderPlan();
}

function getHabitsDone(suppDone, doneLogs) {
  const today = todayStr();
  const waterTarget = 8;
  const waterCount = parseInt(localStorage.getItem('water_'+today)||'0');
  const pausedSupps = safeParseJSON(localStorage.getItem('supps_paused'))||{};
  const activeSupps = SUPPS.filter(s=>!pausedSupps[s.key]);
  const allSupps = activeSupps.length > 0 && activeSupps.every(s=>suppDone[s.key]);
  const todayInfo = getTodayInfo();
  const hasTraining = doneLogs?.some(l => l.day_idx===todayInfo?.dayIdx) || false;
  const manual = safeParseJSON(localStorage.getItem('habits_manual_'+today))||{};
  return {
    training: hasTraining,
    water:    waterCount >= waterTarget,
    supps:    allSupps,
    meds:     !!manual.meds,
    stretch:  !!manual.stretch,
    diary:    !!manual.diary,
    craft:    !!manual.craft,
  };
}

function toggleHabit(key) {
  const today = todayStr();
  const manual = safeParseJSON(localStorage.getItem('habits_manual_'+today))||{};
  manual[key] = !manual[key];
  localStorage.setItem('habits_manual_'+today, JSON.stringify(manual));
  updateHabitsUI();
}

function getHabitStreak(key) {
  let streak = 0;
  const today = new Date(todayStr()+'T12:00:00');
  for (let i = 0; i < 90; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const manual = safeParseJSON(localStorage.getItem('habits_manual_'+ds))||{};
    let wasDone = !!manual[key];
    if (!wasDone && key==='water') wasDone = parseInt(localStorage.getItem('water_'+ds)||'0') >= 8;
    if (!wasDone && i > 0) break;
    if (wasDone) streak++;
  }
  return streak;
}

function buildHabitsSection(suppDone, doneLogs) {
  const done = getHabitsDone(suppDone, doneLogs);
  const rings = HABITS.map(h => {
    const isDone = done[h.key];
    const streak = getHabitStreak(h.key);
    const clickAttr = h.auto ? '' : `onclick="toggleHabit('${h.key}')"`;
    const cursor = h.auto ? 'default' : 'pointer';
    return `<div class="habit-ring-wrap" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:${cursor}" ${clickAttr}>
      <div class="habit-ring" style="width:44px;height:44px;border-radius:50%;border:2.5px solid ${isDone?'var(--green)':'var(--border)'};background:${isDone?'rgba(76,175,130,0.15)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s">${h.icon}</div>
      <div class="habit-lbl" style="font-size:8px;color:${isDone?'var(--green)':'var(--muted)'};text-align:center;letter-spacing:.3px;max-width:40px;line-height:1.2">${h.label}</div>
      <div class="habit-streak" style="font-size:9px;color:var(--accent);font-weight:500;min-height:13px">${streak>0?streak+'d':''}</div>
    </div>`;
  }).join('');

  const completedCount = HABITS.filter(h=>done[h.key]).length;
  return `
  <div class="sec-label" style="margin-top:16px">Daily Habits <span class="habit-count" style="color:var(--muted);font-weight:400;font-size:10px">${completedCount}/${HABITS.length} today</span></div>
  <div class="card" id="habits-card">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:4px 0 8px">
      ${rings}
    </div>
    <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px">
      ${HABITS.filter(h=>!h.auto).map(h=>`
        <div class="habit-check-row" style="display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="toggleHabit('${h.key}')">
          <div class="habit-box" style="width:18px;height:18px;border:1.5px solid ${done[h.key]?'var(--green)':'var(--border)'};border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${done[h.key]?'var(--green)':'transparent'};margin-top:1px">
            ${done[h.key]?'<svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>':''}
          </div>
          <div style="flex:1">
            <div style="font-size:12px;color:var(--text)">${h.icon} ${h.label}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:1px">${h.desc}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;line-height:1.5;opacity:.8">${h.why}</div>
          </div>
          <div class="habit-row-streak" style="font-size:10px;color:var(--accent);font-weight:500;flex-shrink:0">${getHabitStreak(h.key)>0?getHabitStreak(h.key)+'d 🔥':''}</div>
        </div>`).join('')}
    </div>
    ${buildHabitHeatmap()}
  </div>`;
}

function buildHabitHeatmap() {
  const today = todayStr();
  const days = [];
  for (let i = 20; i >= 0; i--) {
    const d = new Date(today+'T12:00:00'); d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }
  const dayLabels = days.map((ds,i) => {
    if (i===20) return '<span style="color:var(--accent)">•</span>';
    if (i%7===0) return `<span>${ds.slice(8)}</span>`;
    return '<span></span>';
  }).join('');
  const rows = HABITS.map(h => {
    const cells = days.map(ds => {
      const manual = safeParseJSON(localStorage.getItem('habits_manual_'+ds))||{};
      let isDone = !!manual[h.key];
      if (!isDone && h.key==='water') isDone = parseInt(localStorage.getItem('water_'+ds)||'0') >= 8;
      const isToday = ds===today;
      const bg = isDone ? 'var(--green)' : isToday ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.04)';
      const border = isToday ? '1px solid var(--accent)' : '1px solid transparent';
      return `<div style="width:100%;aspect-ratio:1;border-radius:3px;background:${bg};border:${border}"></div>`;
    }).join('');
    return `<div style="display:contents"><div style="font-size:16px;line-height:1;display:flex;align-items:center">${h.icon}</div>${cells}</div>`;
  }).join('');
  return `<div style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:.5px">21-DAY HEATMAP</div>
    <div style="display:grid;grid-template-columns:20px repeat(21,1fr);gap:3px;align-items:center">
      <div></div>${dayLabels}${rows}
    </div>
  </div>`;
}

function updateHabitsUI() {
  const card = document.getElementById('habits-card');
  if (!card) return;
  const suppDone = safeParseJSON(localStorage.getItem('supps_'+todayStr()))||{};
  const done = getHabitsDone(suppDone, null);
  const ringDivs = card.querySelectorAll('.habit-ring-wrap');
  HABITS.forEach((h,i) => {
    const wrap = ringDivs[i]; if (!wrap) return;
    const isDone = done[h.key]; const streak = getHabitStreak(h.key);
    const ring = wrap.querySelector('.habit-ring');
    const lbl  = wrap.querySelector('.habit-lbl');
    const streakEl = wrap.querySelector('.habit-streak');
    if (ring) { ring.style.borderColor = isDone?'var(--green)':'var(--border)'; ring.style.background = isDone?'rgba(76,175,130,0.15)':'transparent'; }
    if (lbl)  { lbl.style.color = isDone?'var(--green)':'var(--muted)'; }
    if (streakEl) streakEl.textContent = streak>0?streak+'d':'';
  });
  const rows = card.querySelectorAll('.habit-check-row');
  HABITS.filter(h=>!h.auto).forEach((h,i) => {
    const row = rows[i]; if (!row) return;
    const isDone = done[h.key]; const streak = getHabitStreak(h.key);
    const box = row.querySelector('.habit-box');
    const streakEl = row.querySelector('.habit-row-streak');
    if (box) { box.style.borderColor = isDone?'var(--green)':'var(--border)'; box.style.background = isDone?'var(--green)':'transparent'; box.innerHTML = isDone?'<svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>':''; }
    if (streakEl) streakEl.textContent = streak>0?streak+'d 🔥':'';
  });
  const countEl = card.previousElementSibling?.querySelector?.('.habit-count');
  if (countEl) countEl.textContent = `${HABITS.filter(h=>done[h.key]).length}/${HABITS.length} today`;
}

function logWater(count) {
  localStorage.setItem('water_'+todayStr(), count);
  const card = document.querySelector('.water-card');
  if (!card) return;
  const target = parseInt(card.dataset.target||8);
  const totalEl = card.querySelector('.water-total');
  if (totalEl) totalEl.textContent = (count*250)+' ml';
  card.querySelectorAll('.glass').forEach((g,i) => {
    g.classList.toggle('filled', i<count);
    g.onclick = ()=>logWater(i<count?i:i+1);
  });
  const pbar = card.querySelector('.water-pbar');
  if (pbar) pbar.style.width = Math.min(100,count/target*100)+'%';
  sb.from('body_logs').upsert({date:todayStr(),water_glasses:count},{onConflict:'date'}).then(()=>{});
}

function getSuppPaused(key) { return !!(safeParseJSON(localStorage.getItem('supps_paused'))||{})[key]; }
function toggleSuppPause(key) {
  const paused = safeParseJSON(localStorage.getItem('supps_paused'))||{};
  paused[key] = !paused[key];
  localStorage.setItem('supps_paused', JSON.stringify(paused));
  const el = document.querySelector(`[data-supp-key="${key}"]`);
  if (!el) return;
  const isPaused = !!paused[key];
  el.style.opacity = isPaused?'0.45':'';
  const check = el.querySelector('.supp-check');
  if (check) {
    check.style.borderColor = isPaused?'var(--muted)':'';
    check.innerHTML = isPaused
      ? `<svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round"><line x1="4" y1="3" x2="4" y2="9"/><line x1="8" y1="3" x2="8" y2="9"/></svg>`
      : `<svg class="supp-check-mark" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>`;
  }
  el.onclick = isPaused?null:()=>toggleSupp(key);
}
let _suppHoldTimer = null;
function startSuppHold(key) { _suppHoldTimer = setTimeout(()=>toggleSuppPause(key), 600); }
function clearSuppHold() { clearTimeout(_suppHoldTimer); }

function toggleSupp(key) {
  const d = safeParseJSON(localStorage.getItem('supps_'+todayStr()))||{};
  d[key] = !d[key];
  localStorage.setItem('supps_'+todayStr(), JSON.stringify(d));
  const el = document.querySelector(`[data-supp-key="${key}"]`);
  if (el) el.classList.toggle('done', !!d[key]);
  updateHabitsUI();
  sb.from('body_logs').upsert({date:todayStr(),supps_done:d},{onConflict:'date'}).then(()=>{});
}

function getMacroFeedback(actual, target, dayType) {
  const msgs = [];
  const kcalPct = actual.kcal / target.kcal;
  const protDiff = actual.protein - target.protein;
  const carbsDiff = actual.carbs - target.carbs;
  const isTraining = dayType !== 'rest';

  if (kcalPct < 0.80) msgs.push({color:'var(--red)', icon:'⚠️', text:`Under-fuelled (${actual.kcal} vs ${target.kcal} kcal). You cannot gain muscle or perform at your best in a significant deficit. Eat more — prioritise carbs and protein.`});
  else if (kcalPct >= 0.80 && kcalPct < 0.93) msgs.push({color:'var(--yellow)', icon:'⚡', text:`Slightly below target. Acceptable, but aim for the full ${target.kcal} kcal on training days to maximise muscle gain.`});
  else if (kcalPct >= 0.93 && kcalPct <= 1.15) msgs.push({color:'var(--green)', icon:'✅', text:`Calories on target — you are feeding muscle growth while keeping the surplus lean.`});
  else if (kcalPct > 1.15) msgs.push({color:'var(--yellow)', icon:'📈', text:`Surplus above target (+${actual.kcal-target.kcal} kcal). Small excess is fine on hard days, but keep it controlled to stay lean.`});

  if (protDiff < -20) msgs.push({color:'var(--red)', icon:'💪', text:`Protein too low (${actual.protein}g vs ${target.protein}g). Below the threshold to build and protect muscle. Add a shake or extra protein source today.`});
  else if (protDiff >= -20 && protDiff <= 20) msgs.push({color:'var(--green)', icon:'💪', text:`Protein on target — muscle building is supported.`});

  if (isTraining && actual.carbs < target.carbs * 0.7) msgs.push({color:'var(--red)', icon:'⚡', text:`Carbs too low for a training day. Your fencing and gym performance will suffer — carbs are the primary fuel for explosive work.`});
  return msgs;
}

function buildMacroSection(dayType) {

  const dayLabel = dayType==='double'?'Double Session':dayType==='single'?'Single Session':'Rest Day';

    const pct = Math.min(100,Math.round(val/tgt*100));
    const over = val > tgt;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="color:var(--muted)">${label}</span>
        <span style="color:${over?'var(--yellow)':'var(--text)'}">${val}<span style="color:var(--muted)"> / ${tgt}${label==='Kcal'?'':' g'}</span></span>
      </div>
      <div style="height:5px;background:var(--card2);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${over?'var(--yellow)':color};border-radius:3px;transition:width .3s"></div>
      </div>
    </div>`;
  };
  const feedback = actual ? getMacroFeedback(actual, target, dayType) : [];
  return `
  <div class="sec-label" style="margin-top:16px">Nutrition <span style="color:var(--muted);font-weight:400;font-size:10px">${dayLabel} — gaining phase</span></div>
  <div class="card" id="macro-card">
    <div style="background:rgba(61,155,233,.08);border:1px solid rgba(61,155,233,.2);border-radius:8px;padding:8px 10px;margin-bottom:12px;font-size:11px;color:var(--accent);line-height:1.5">
      💡 <strong>Goal: Lean muscle gain.</strong> Eat at or above target every day. Protein is non-negotiable at 130g. Carbs are your performance fuel — don't skip them on training days.
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px">
      ${[{label:'Kcal',val:target.kcal,color:'var(--accent)'},{label:'Protein',val:target.protein,color:'var(--teal)'},{label:'Carbs',val:target.carbs,color:'var(--yellow)'},{label:'Fat',val:target.fat,color:'var(--purple)'}].map(m=>`<div style="background:var(--card2);border-radius:8px;padding:8px 6px;text-align:center"><div style="font-size:15px;font-weight:500;color:${m.color}">${m.val}</div><div style="font-size:9px;color:var(--muted);margin-top:1px">${m.label}</div></div>`).join('')}
    </div>
    ${actual ? `
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:8px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between"><span>Logged today</span><div style="display:flex;gap:10px"><button onclick="openMacroModal('add')" style="background:none;border:none;color:var(--green);font-size:11px;cursor:pointer;padding:0">＋ Add meal</button><button onclick="openMacroModal('edit')" style="background:none;border:none;color:var(--accent);font-size:11px;cursor:pointer;padding:0">Edit</button></div></div>
        ${macroBar('Kcal',actual.kcal,target.kcal,'var(--accent)')}
        ${macroBar('Protein',actual.protein,target.protein,'var(--teal)')}
        ${macroBar('Carbs',actual.carbs,target.carbs,'var(--yellow)')}
        ${macroBar('Fat',actual.fat,target.fat,'var(--purple)')}
      </div>
      ${feedback.map(f=>`<div style="background:var(--card2);border-left:3px solid ${f.color};border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:11px;color:var(--text);line-height:1.5">${f.icon} ${f.text}</div>`).join('')}
    ` : `<button onclick="openMacroModal('add')" style="width:100%;padding:10px;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--accent);cursor:pointer;font-size:12px;letter-spacing:.5px">＋ Log today's nutrition</button>`}
  </div>`;
}

function openMacroModal(mode) {
  const dayType = getDayType(getTodayInfo()?.weekIdx||0, getTodayInfo()?.dayIdx||0);
  const target = NUTRITION[dayType]||NUTRITION.single;
  const existing = getMacroLog(todayStr())||{kcal:0,protein:0,carbs:0,fat:0};
  const isAdd = mode==='add'||!existing.kcal;
  openModal(isAdd?'＋ Add meal':'Edit totals', `
    ${existing.kcal&&isAdd?`<div style="background:var(--card2);border-radius:8px;padding:8px 10px;margin-bottom:12px;font-size:11px;color:var(--muted)">Current: <strong style="color:var(--text)">${existing.kcal} kcal · ${existing.protein}g P · ${existing.carbs}g C · ${existing.fat}g F</strong></div>`:''}
    ${[{id:'f-kcal',label:'Calories (kcal)',hint:isAdd?`add to ${existing.kcal}`:`target ${target.kcal}`},{id:'f-protein',label:'Protein (g)',hint:isAdd?`add to ${existing.protein}g`:`target ${target.protein}g`},{id:'f-carbs',label:'Carbs (g)',hint:isAdd?`add to ${existing.carbs}g`:`target ${target.carbs}g`},{id:'f-fat',label:'Fat (g)',hint:isAdd?`add to ${existing.fat}g`:`target ${target.fat}g`}].map(f=>`<div class="form-field"><div class="form-label">${f.label} <span style="color:var(--muted);font-weight:300">· ${f.hint}</span></div><input class="form-input" id="${f.id}" type="number" placeholder="0"></div>`).join('')}
    <input type="hidden" id="f-macro-mode" value="${isAdd?'add':'edit'}">
  `, saveMacroModal);
}

function saveMacroModal() {
  const mode = document.getElementById('f-macro-mode')?.value||'add';
  const existing = getMacroLog(todayStr())||{kcal:0,protein:0,carbs:0,fat:0};
  const input = {kcal:parseInt(document.getElementById('f-kcal')?.value)||0,protein:parseInt(document.getElementById('f-protein')?.value)||0,carbs:parseInt(document.getElementById('f-carbs')?.value)||0,fat:parseInt(document.getElementById('f-fat')?.value)||0};
  const data = mode==='add'?{kcal:existing.kcal+input.kcal,protein:existing.protein+input.protein,carbs:existing.carbs+input.carbs,fat:existing.fat+input.fat}:input;
  saveMacroLog(data); closeModal(); renderToday();
}

function buildSessionCard(s, wIdx, dIdx, slot, done, isDouble) {
  const resolved = resolveSession(wIdx, dIdx, slot);
  if (resolved === null) return `<div class="sblock rest" style="opacity:.5;border-style:dashed">
    <div class="sblock-tag" style="color:var(--muted)">Moved</div>
    <div class="sblock-name" style="color:var(--muted)">${s?.n||''}</div>
    <div class="sblock-detail" style="font-size:10px">Session moved to another day</div>
    <div class="sblock-actions"><button class="btn-done" style="background:var(--card2)" onclick="undoSwap(${wIdx},${dIdx},'${slot}')">Undo Move</button></div>
  </div>`;
  if (!resolved || resolved.t==='rest') return `<div class="sblock rest"><div class="sblock-tag">Rest</div><div class="sblock-name">${resolved?.n||'Rest'}</div><div class="sblock-detail">${resolved?.d||''}</div></div>`;
  const [logW,logD,logS] = resolveLogContext(wIdx,dIdx,slot);
  const badge = isDouble&&slot==='am'?'<span class="double-badge">AM</span> ':isDouble&&slot==='pm'?'<span class="pm-badge">PM</span> ':'';
  const isFuture = isFutureSession(wIdx,dIdx);
  const isToday = sessionDate(wIdx,dIdx)===todayStr();
  const canMove = (isFuture||isToday)&&!done;
  return `<div class="sblock ${resolved.t} ${done?'done':''}">
    ${badge}<div class="sblock-tag">${resolved.t}</div>
    <div class="sblock-name">${resolved.n}</div>
    <div class="sblock-detail">${resolved.d}</div>
    ${resolved.dur?`<div class="sblock-dur">${resolved.dur}</div>`:''}
    <div class="sblock-actions">
      <button class="btn-log" onclick="openLogModal(${logW},${logD},'${logS}','${sessionDate(wIdx,dIdx)}')">${done?'✓ Edit Log':'Save Session'}</button>
      ${canMove?`<button class="btn-done" style="background:var(--card2);color:var(--accent)" onclick="openMoveModal(${wIdx},${dIdx},'${slot}')">↔ Move</button>`:''}
    </div>
  </div>`;
}

async function renderPlan() {
  const info = getTodayInfo();
  if (info && !planWeekInitialized) { planWeekIdx = info.weekIdx; planWeekInitialized = true; }
  const el = document.getElementById('plan-content');
  if (!el.innerHTML||el.innerHTML.includes('Loading')) el.innerHTML='<div class="loading">Loading…</div>';

  const [{data:doneLogs},{data:allLogs}] = await Promise.all([
    sb.from('session_logs').select('week_idx,day_idx,slot,data,type').eq('week_idx',planWeekIdx),
    sb.from('session_logs').select('week_idx,slot,data,type'),
  ]);

  const isDone = (dIdx,slot) => {
    const [,logD,logS] = resolveLogContext(planWeekIdx,dIdx,slot);
    return doneLogs?.some(l=>l.day_idx===logD&&l.slot===logS)||false;
  };

  const phColors=['','var(--green)','var(--yellow)','var(--accent)','var(--teal)'];
  const phNames=['','Competition Ready','Foundation','Summer Build','Competition Season'];
  const week = PLAN[planWeekIdx];
  const isCurrentWeek = info&&info.weekIdx===planWeekIdx;
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const isPlanned = l=>l.slot&&l.slot!=='custom';
  const sessionsDone = (doneLogs||[]).filter(isPlanned).length;
  const totalDonePlanned = (allLogs||[]).filter(isPlanned).length;
  const weeksComplete = info?info.weekIdx:0;
  let scheduledUntilToday = 0;
  if (info) {
    PLAN.forEach((w,wi) => {
      if (wi<info.weekIdx) { scheduledUntilToday+=w.sessions; }
      else if (wi===info.weekIdx) {
        w.days.forEach((day,di) => {
          if (di<=info.dayIdx) {
            if (day.am&&day.am.t!=='rest') scheduledUntilToday++;
            if (day.pm&&day.pm.t!=='rest') scheduledUntilToday++;
          }
        });
      }
    });
  }
  const overallPct = Math.round(weeksComplete/TOTAL_WEEKS*100);

  let navHTML=''; let lastPh=0;
  PLAN.forEach((w,i) => {
    if (w.ph!==lastPh){navHTML+=`<span class="phase-sep" style="color:${phColors[w.ph]}">P${w.ph}</span>`;lastPh=w.ph;}
    const isPast = info&&i<info.weekIdx;
    navHTML+=`<button class="wbtn ${i===planWeekIdx?'active':''}" onclick="selectPlanWeek(${i})"><span style="${isPast?'color:var(--green)':''}"> ${isPast?'✓':''}</span>${w.lbl}</button>`;
  });

  // Offset plan columns by the day-of-week PROGRAM_START falls on (May 26 2026 = Tuesday → startDow=1)
  const _psDate = new Date(PROGRAM_START+'T12:00:00');
  const startDow = (_psDate.getDay()+6)%7; // Mon=0,Tue=1,...,Sun=6

  const gridHTML = dayNames.map((d,i) => {
    const dIdx = i - startDow; // e.g. Fri col (i=4) with startDow=1 → dIdx=3
    const day=(dIdx>=0&&dIdx<week.days.length)?week.days[dIdx]:null;
    const isToday=isCurrentWeek&&info&&info.dayIdx===dIdx;
    const isPastDay = info&&(planWeekIdx<info.weekIdx||(planWeekIdx===info.weekIdx&&dIdx<info.dayIdx));
    if (!day) return `<div class="dcol"><div class="dhead">${d}</div></div>`;
    const rawAm=resolveSession(planWeekIdx,dIdx,'am'); const rawPm=resolveSession(planWeekIdx,dIdx,'pm');
    const movedOutAm=rawAm===null&&isMovedOut(planWeekIdx,dIdx,'am');
    const movedOutPm=rawPm===null&&isMovedOut(planWeekIdx,dIdx,'pm');
    const resolvedAm=rawAm??day.am; const resolvedPm=rawPm??day.pm;
    const [logWAm,logDAm,logSAm]=resolveLogContext(planWeekIdx,dIdx,'am');
    const [logWPm,logDPm,logSPm]=resolveLogContext(planWeekIdx,dIdx,'pm');
    const amBlock=buildSmallBlock(resolvedAm,planWeekIdx,dIdx,'am',isDone(dIdx,'am'),!!day.pm,movedOutAm,isPastDay,logWAm,logDAm,logSAm);
    const pmBlock=(resolvedPm||movedOutPm)?buildSmallBlock(resolvedPm||{t:'rest',n:'Moved'},planWeekIdx,dIdx,'pm',isDone(dIdx,'pm'),true,movedOutPm,isPastDay,logWPm,logDPm,logSPm):'';
    return `<div class="dcol ${isToday?'today-col':''}"><div class="dhead">${d}</div>${amBlock}${pmBlock}</div>`;
  }).join('');

  el.innerHTML = `
    <div style="position:relative;background:linear-gradient(135deg,#0c0d10 0%,#151a22 100%);border:1px solid rgba(61,155,233,.25);border-radius:12px;padding:18px 16px;margin-bottom:12px;overflow:hidden;display:flex;align-items:center;gap:14px">
      <svg viewBox="0 0 110 130" width="50" height="60" style="flex-shrink:0;opacity:0.95">
        <path d="M55 6 L102 6 L102 80 Q102 112 55 124 Q8 112 8 80 Z" fill="#14161b" stroke="#3D9BE9" stroke-width="1.5"/>
        <line x1="55" y1="18" x2="55" y2="95" stroke="#3D9BE9" stroke-width="2" stroke-linecap="round"/>
        <line x1="45" y1="28" x2="65" y2="48" stroke="#3D9BE9" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="55" y1="18" x2="80" y2="38" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
        <circle cx="55" cy="95" r="4" fill="#3D9BE9"/>
        <text x="55" y="115" fill="white" font-family="'Helvetica Neue',Arial,sans-serif" font-size="8" font-weight="900" letter-spacing="1" text-anchor="middle">FENCING</text>
      </svg>
      <div style="flex:1;min-width:0">
        <div style="font-size:10px;letter-spacing:2px;color:#3D9BE9;font-weight:700;margin-bottom:2px">22-WEEK PROGRAM</div>
        <div style="font-size:17px;font-weight:900;color:white;letter-spacing:-.3px;line-height:1.1">${info?`Week ${info.weekNum} · ${phNames[week?.ph||1]}`:'Loading…'}</div>
        <div style="font-size:11px;color:#6e7a8a;margin-top:3px">${totalDonePlanned} of ${scheduledUntilToday} sessions done</div>
        <div style="height:4px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin-top:8px">
          <div style="height:100%;width:${Math.min(100,Math.round(totalDonePlanned/Math.max(1,scheduledUntilToday)*100))}%;background:linear-gradient(90deg,#3D9BE9,#7EC8F0);border-radius:3px;transition:width .4s"></div>
        </div>
      </div>
    </div>
    <div class="week-nav">${navHTML}</div>
    <div class="wstats">
      <div class="wstat"><div class="wstat-val">${week.gym}</div><div class="wstat-lbl">gym days</div></div>
      <div class="wstat"><div class="wstat-val">${week.sessions}</div><div class="wstat-lbl">sessions</div></div>
      <div class="wstat"><div class="wstat-val">${week.fencing}</div><div class="wstat-lbl">fencing</div></div>
      <div class="wstat"><div class="wstat-val" style="color:${phColors[week.ph]};font-size:10px;padding-top:4px">${phNames[week.ph].split(' ')[0]}</div><div class="wstat-lbl">phase ${week.ph}</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Fencing</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Gym</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Run</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Yoga</div>
    </div>
    <div class="day-grid">${gridHTML}</div>
  `;
}

function buildSmallBlock(s,wIdx,dIdx,slot,done,isDouble,movedOut,isPastDay,logW,logD,logS) {
  const slotLabel=isDouble&&slot==='am'?' AM':isDouble&&slot==='pm'?' PM':'';
  if (movedOut) return `<div class="sblock-sm rest" style="opacity:.45;border-style:dashed"><div class="sm-tag" style="color:var(--muted)">moved${slotLabel}</div><div class="sm-name" style="color:var(--muted)">—</div></div>`;
  const lw=logW??wIdx,ld=logD??dIdx,ls=logS??slot;
  const canMove=s.t!=='rest'&&!done&&!isPastDay;
  const moveBtn=canMove?`<button onclick="event.stopPropagation();openMoveModal(${wIdx},${dIdx},'${slot}')" style="position:absolute;top:4px;right:4px;background:rgba(61,155,233,0.12);border:none;border-radius:4px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0">
    <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
  </button>`:'';
  const clickAction=s.t!=='rest'&&!isPastDay?`openLogModal(${lw},${ld},'${ls}','${sessionDate(wIdx,dIdx)}')` :'';
  const pastStyle=isPastDay&&!done?'opacity:0.5;':'';
  return `<div class="sblock-sm ${s.t} ${done?'done-sm':''}" style="position:relative;${pastStyle}" ${clickAction?`onclick="${clickAction}"`:'overflow:hidden'}>
    <div class="sm-tag" style="color:${typeColor(s.t)}">${s.t}${slotLabel}</div>
    <div class="sm-name">${s.n}</div>
    ${s.dur?`<div class="sm-dur">${s.dur}</div>`:''}
    ${moveBtn}
  </div>`;
}

async function openLogModal(wIdx, dIdx, slot, displayDate=null) {
  const s = slot==='pm'?PLAN[wIdx]?.days[dIdx]?.pm:PLAN[wIdx]?.days[dIdx]?.am;
  if (!s||s.t==='rest') { showToast('Session not found'); return; }
  const sDate = displayDate||sessionDate(wIdx,dIdx);
  const past = sDate < todayStr();
  _logCtx = {wIdx,dIdx,slot,session:s,date:sDate,isPast:past};
  _extraExCount = 0;

  if (s.t==='strength') {
    const {data:latestLogs} = await sb.from('session_logs').select('data,created_at').eq('type','strength').order('created_at',{ascending:false}).limit(30);
    if (latestLogs) {
      const seen = {};
      for (const log of latestLogs) {
        for (const ex of log.data?.exercises||[]) {
          if (!seen[ex.name]&&ex.sets?.length) {
            const maxKg = Math.max(...ex.sets.map(s=>s.kg||0));
            if (maxKg>0) { seen[ex.name]=true; USER.lifts[ex.name]={w:maxKg,r:ex.sets.at(-1)?.reps||5}; }
          }
        }
      }
    }
  }

  const forms = {
    strength: buildStrengthForm(s),
    fencing:  buildFencingForm(s),
    run:      buildRunForm(s),
    yoga:     buildYogaForm(s),
  };
  const form = forms[s.t] || buildFencingForm(s);
  const warning = past ? `<div class="alert yellow" style="margin-bottom:14px"><div class="alert-title">Past Session</div>Logging for <strong>${sDate}</strong> — updates your historical record.</div>` : '';
  openModal('Log · '+s.n, warning+form, saveLogSession);
}

async function saveLogSession() {
  if (!_logCtx) return;
  const {wIdx,dIdx,slot,session:s,date} = _logCtx;
  let data = {};

  if (s.t==='strength') {
    const exercises=[];
    document.querySelectorAll('.exercise-block').forEach(block=>{
      if (block.style.display==='none') return;
      const name=block.querySelector('.exercise-name')?.textContent?.trim();
      if (!name) return;
      const sets=[];
      block.querySelectorAll('.set-row').forEach(row=>{
        const repsInput=row.querySelector('[id^="reps-"]');
        const kgInput=row.querySelector('[id^="kg-"]');
        if (!repsInput||!kgInput) return;
        const reps=parseInt(repsInput.value)||0;
        const kg=parseFloat(kgInput.value)||0;
        if (reps>0||kg>0) sets.push({reps,kg});
      });
      if (sets.length) exercises.push({name,sets});
    });
    data={exercises,duration:document.getElementById('f-dur')?.value||'',hr:parseInt(document.getElementById('f-hr')?.value)||null,notes:document.getElementById('f-notes')?.value||''};
  } else if (s.t==='fencing') {
    data={energy:parseInt(document.getElementById('f-energy')?.value)||null,focus:parseInt(document.getElementById('f-focus')?.value)||null,technique:parseInt(document.getElementById('f-technique')?.value)||null,notes:document.getElementById('f-notes')?.value||''};
  } else if (s.t==='run') {
    data={distance:parseFloat(document.getElementById('f-dist')?.value)||0,duration:document.getElementById('f-dur')?.value||'',hr:parseInt(document.getElementById('f-hr')?.value)||null,rpe:parseInt(document.getElementById('f-rpe')?.value)||null,hip_ok:document.getElementById('f-hip-ok')?.value||'fine',notes:document.getElementById('f-notes')?.value||''};
  } else if (s.t==='yoga') {
    data={duration:parseInt(document.getElementById('f-duration')?.value)||null,hip_feel:parseInt(document.getElementById('f-hip')?.value)||null,notes:document.getElementById('f-notes')?.value||''};
  }

  try {
    const {error:insertErr} = await sb.from('session_logs').insert({date,week_idx:wIdx,day_idx:dIdx,slot,type:s.t,name:s.n,data});
    if (insertErr) {
      console.error('[saveLogSession]', insertErr);
      showToast('Error saving: ' + (insertErr.message||'check Supabase'));
      return;
    }
    showToast('Session saved ✓');
  } catch(e) { showToast('Error saving — check Supabase connection'); console.error(e); return; }
  closeModal();
  if (activePanel==='today') renderToday();
  if (activePanel==='plan')  renderPlan();
  if (activePanel==='log')   renderLog();
}

async function markDone(wIdx, dIdx, slot) {
  const week=PLAN[wIdx]; const s=slot==='pm'?week.days[dIdx].pm:week.days[dIdx].am;
  if (!s) return;
  const sDate=sessionDate(wIdx,dIdx);
  if (isPastSession(wIdx,dIdx)) { if (!confirm(`This session was on ${sDate}. Mark done in historical log?`)) return; }
  const {error:mErr} = await sb.from('session_logs').insert({date:sDate,week_idx:wIdx,day_idx:dIdx,slot,type:s.t,name:s.n,data:{completed:true}});
  if (mErr) { showToast('Error: ' + (mErr.message||'check Supabase')); console.error(mErr); return; }
  showToast('Marked done ✓');
  if (activePanel==='today') renderToday();
  if (activePanel==='plan')  renderPlan();
}

async function renderLog() {
  const el = document.getElementById('log-content');
  el.innerHTML='<div class="loading">Loading…</div>';
  const {data:logs} = await sb.from('session_logs').select('*').order('created_at',{ascending:false}).limit(60);
  if (!logs||!logs.length) { el.innerHTML='<div class="empty-state"><div class="empty-state-title">No Sessions Yet</div><p>Log your first session from the Today or Plan tab.</p></div>'; return; }

  const groups = {};
  logs.forEach(l=>{
    const wk = `Week ${(l.week_idx||0)+1}`;
    if (!groups[wk]) groups[wk]=[];
    groups[wk].push(l);
  });

  let html = '';
  for (const [wk, items] of Object.entries(groups)) {
    html += `<div style="font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--muted);margin:16px 0 8px">${wk}</div>`;
    items.forEach(l=>{
      const metrics = buildLogMetrics(l);
      html += `<div class="log-recent-item" onclick="openLogDetail(${JSON.stringify(l).replace(/"/g,'&quot;')})">
        <div class="log-ri-top">
          <span class="log-ri-name"><span style="color:${typeColor(l.type)};font-size:9px;text-transform:uppercase;letter-spacing:.5px;margin-right:6px">${l.type}</span>${l.name}</span>
          <span class="log-ri-date">${l.date||''}</span>
        </div>
        <div class="log-ri-metrics">${metrics}</div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function buildLogMetrics(l) {
  const d = l.data||{};
  if (l.type==='strength') {
    const sets = (d.exercises||[]).reduce((s,e)=>s+(e.sets?.length||0),0);
    const topKg = (d.exercises||[]).reduce((max,e)=>Math.max(max,...(e.sets||[]).map(s=>s.kg||0)),0);
    return `<em>${(d.exercises||[]).length} exercises</em> · ${sets} sets${topKg?` · top <em>${topKg}kg</em>`:''}${d.duration?` · ${d.duration}`:''}`;
  }
  if (l.type==='fencing') return `Energy <em>${d.energy||'—'}/10</em> · Focus <em>${d.focus||'—'}/10</em> · Technique <em>${d.technique||'—'}/10</em>`;
  if (l.type==='run') return `<em>${d.distance||'—'} km</em>${d.duration?` · ${d.duration}`:''}${d.hr?` · ${d.hr} bpm`:''}`;
  if (l.type==='yoga') return `<em>${d.duration||'—'} min</em>${d.hip_feel?` · hip <em>${d.hip_feel}/10</em>`:''}`;
  return d.notes||'';
}

function connectPolar() {

async function handlePolarCallback(code) {
  try {
    // Exchange code via Supabase edge function (you need to set this up, or use your own proxy)
    const res = await fetch(`https://dgipqrsuyezqscbwgbup.supabase.co/functions/v1/polar-token`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({code, redirect_uri: POLAR_CFG.redirectUri, client_id: POLAR_CFG.clientId, client_secret: POLAR_CFG.clientSecret})
    });
    const data = await res.json();
    if (!data.access_token) throw new Error(JSON.stringify(data));
    localStorage.setItem('polar_auth', JSON.stringify({access_token:data.access_token, x_user_id:data.x_user_id}));
    // Register user (safe to ignore 409)
    await fetch(`https://www.polaraccesslink.com/v3/users`, {
      method:'POST',
      headers:{'Authorization':`Bearer ${data.access_token}`,'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({'member-id':String(data.x_user_id)})
    }).catch(()=>{});
    showToast('Polar connected! Tap Import to sync sleep & HRV.');
  } catch(e) { showToast('Polar connection failed: '+e.message); }
}

async function importPolar() {
  const auth = safeParseJSON(localStorage.getItem('polar_auth'));
  if (!auth?.access_token) { showToast('Connect Polar first'); return; }
  showToast('Importing Polar sleep & HRV…');
  try {
    const uid = auth.x_user_id;
    const h = {'Authorization':`Bearer ${auth.access_token}`,'Accept':'application/json'};
    const [sRes, nRes] = await Promise.all([
      fetch(`https://www.polaraccesslink.com/v3/users/${uid}/sleep`, {headers:h}),
      fetch(`https://www.polaraccesslink.com/v3/users/${uid}/nightly-recharge`, {headers:h}),
    ]);
    const sData = await sRes.json().catch(()=>({}));
    const nData = await nRes.json().catch(()=>({}));
    const nights = sData?.nights || sData?.data || [];
    const nrItems = nData?.recharges || nData?.data || [];
    const nrByDate = {};
    nrItems.forEach(r=>{ const d=(r.date||r.nightly_recharge_date||'').slice(0,10); if(d) nrByDate[d]=r; });
    let imported = 0;
    for (const night of nights) {
      const date = (night.date||night.sleep_start_time||'').slice(0,10);
      if (!date || date < PROGRAM_START) continue;
      const startMs = night.sleep_start_time ? new Date(night.sleep_start_time).getTime() : 0;
      const endMs   = night.sleep_end_time   ? new Date(night.sleep_end_time).getTime()   : 0;
      const sleepHours = startMs && endMs ? +((endMs-startMs)/3600000).toFixed(1) : null;
      const sleepScore = night.sleep_score ?? null;
      const nr = nrByDate[date];
      const ansCharge = nr?.ans_charge ?? null;
      let hrv = null;
      if (ansCharge!==null) hrv = ansCharge>=3?'green':ansCharge>=2?'orange':'red';
      const hrv_value = nr?.heart_rate_avg ?? null;
      const entry = {date};
      if (sleepHours) entry.sleep_hours = sleepHours;
      if (sleepScore!=null) { entry.sleep_score = sleepScore; localStorage.setItem('sleep_'+date, sleepScore); }
      if (hrv) entry.hrv = hrv;
      if (hrv_value) entry.hrv_value = hrv_value;
      await sb.from('body_logs').upsert({...entry},{onConflict:'date'});
      imported++;
    }
    showToast(`✓ Imported ${imported} night${imported!==1?'s':''} from Polar`);
    if (activePanel==='body') renderBody();
  } catch(e) { showToast('Import failed: '+e.message); }
}

async function saveBodyLog() {
  const entry={
    date:todayStr(),
    weight_kg: parseFloat(document.getElementById('b-weight')?.value)||null,
    body_fat_pct: parseFloat(document.getElementById('b-bf')?.value)||null,
    sleep_hours: parseFloat(document.getElementById('b-sleeph')?.value)||null,
    sleep_score: parseInt(document.getElementById('b-sleeps')?.value)||null,
    hrv_value: parseInt(document.getElementById('b-hrv-val')?.value)||null,
    hrv: _hrvSelected||null,
    notes: document.getElementById('b-notes')?.value||null,
  };
  Object.keys(entry).forEach(k=>{ if(entry[k]===null||entry[k]===undefined) delete entry[k]; });
  await sb.from('body_logs').upsert({date:todayStr(),...entry},{onConflict:'date'});
  if (entry.sleep_score) localStorage.setItem('sleep_'+todayStr(), entry.sleep_score);
  showToast('Saved ✓');
  renderBody();
  if (activePanel==='today') renderToday();
}

function getCueWord() { return localStorage.getItem('cue_word') || 'HERE'; }
function saveCueWord() {

  localStorage.setItem('cue_word', w);
  showToast('Cue word saved: ' + w);

function toggleCompSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  const chevron = document.querySelector(`[data-chevron="${id}"]`);
  if (chevron) chevron.textContent = open ? '▸' : '▾';
}

function getCompPhase() {
  const dates = getCompDates();
  const today = todayStr();
  const comps = [
    {name:'Nationals', emoji:'🥇', date:dates.nationals},
    {name:'Europeans', emoji:'🏆', date:dates.europeans},
  ];
  for (const comp of comps) {
    if (!comp.date) continue;
    const diff = Math.round((new Date(comp.date+'T12:00:00') - new Date(today+'T12:00:00')) / 86400000);
    if (diff >= -1 && diff <= 3) {
      const phase = diff===0?'race':diff===-1?'recovery':diff===1?'eve':diff===2?'travel':'prep';
      return {phase, comp, diff};
    }
  }
  return null;
}
